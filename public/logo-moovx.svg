<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C97A"/>
      <stop offset="35%" stop-color="#D4A843"/>
      <stop offset="65%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0D78A"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#0D0B08"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.3"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.15"/>

  <!-- X mark — two athletic diagonal strokes -->
  <g filter="url(#glow)">
    <!-- Stroke 1: top-left to bottom-right -->
    <line x1="170" y1="170" x2="342" y2="342" stroke="url(#gold)" stroke-width="28" stroke-linecap="round"/>
    <!-- Stroke 2: top-right to bottom-left -->
    <line x1="342" y1="170" x2="170" y2="342" stroke="url(#gold)" stroke-width="28" stroke-linecap="round"/>
  </g>

  <!-- Center diamond accent -->
  <rect x="244" y="244" width="24" height="24" rx="4" fill="url(#goldLight)" transform="rotate(45 256 256)"/>

  <!-- Top accent dot -->
  <circle cx="256" cy="130" r="5" fill="url(#goldLight)" opacity="0.8"/>

  <!-- Bottom accent dot -->
  <circle cx="256" cy="382" r="5" fill="url(#goldLight)" opacity="0.8"/>

  <!-- MOOVX text below the X -->
  <text x="256" y="440" text-anchor="middle" font-family="'Bebas Neue', 'Arial Narrow', sans-serif" font-size="42" letter-spacing="12" fill="url(#gold)">MOOVX</text>
</svg>
